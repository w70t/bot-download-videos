name: tests

# يشغّل فحص الصياغة (py_compile) ومجموعة الاختبارات (pytest) على كل دفع وكل
# Pull Request، حتى تظهر حالة النجاح/الفشل قبل الدمج في main وتُكتشف الأخطاء
# (مثل استيراد مفقود بين الوحدات) مبكراً.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 هي نسخة خادم التشغيل (Raspberry Pi)، و3.11 تغطية إضافية
        python-version: ['3.11', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check (py_compile)
        # بوابة صياغة سريعة لكل وحدات المشروع (لا تتطلّب استيراد المكتبات الثقيلة)
        run: python -m py_compile *.py

      - name: Run tests
        run: python -m pytest -q
